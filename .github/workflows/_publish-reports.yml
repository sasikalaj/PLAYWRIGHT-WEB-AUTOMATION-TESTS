##############################################################################
# Reusable workflow — Upload & publish Allure + Playwright HTML reports
#
# Caller must upload a single artifact named "{suite-name}-artifacts"
# containing both allure-results/ and playwright-report/ directories.
#
# Inputs:
#   suite-name        — identifier used to find/name artifacts (e.g. regression)
#   deploy-to-pages   — whether to push Allure report to GitHub Pages
#   pages-destination — subdirectory on gh-pages branch (e.g. allure/regression)
##############################################################################

name: Publish Reports (reusable)

on:
  workflow_call:
    inputs:
      suite-name:
        description: 'Suite identifier used in artifact names (regression | smoke | manual)'
        type: string
        required: true
      deploy-to-pages:
        description: 'Deploy Allure report to GitHub Pages'
        type: boolean
        default: false
      pages-destination:
        description: 'GitHub Pages subdirectory (e.g. allure/regression)'
        type: string
        default: ''

jobs:
  publish:
    name: Publish ${{ inputs.suite-name }} Reports
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.suite-name }}-artifacts
          # Extracts to workspace root, preserving allure-results/ and playwright-report/ dirs
          path: .

      - name: Generate Allure report
        run: ./node_modules/.bin/allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite-name }}-allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.suite-name }}-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: inputs.deploy-to-pages && inputs.pages-destination != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: ${{ inputs.pages-destination }}
          commit_message: 'ci: publish ${{ inputs.suite-name }} Allure report for run ${{ github.run_number }}'
